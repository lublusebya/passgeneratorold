<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Генератор паролей</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background-color: #e0e0e0;
    font-family: Arial, sans-serif;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; padding: 15px;
  }
  .container {
    background-color: #f5f5f5;
    border: 2px solid #888888;
    width: 100%; max-width: 420px;
    box-shadow: 3px 3px 0px #999999;
  }
  .header {
    background: linear-gradient(180deg, #ffffff 0%, #d0d0d0 100%);
    border-bottom: 2px solid #888888;
    padding: 12px 15px;
  }
  .header h1 {
    font-size: 18px; color: #333333; text-align: center; font-weight: bold;
    text-shadow: 1px 1px 0px #ffffff;
  }
  .content { padding: 15px; }
  .password-output {
    background-color: #ffffff;
    border: 2px inset #999999;
    padding: 10px; margin-bottom: 15px; min-height: 60px;
    word-break: break-all; font-family: "Courier New", monospace; font-size: 14px; color: #000;
  }
  .form-group {
    margin-bottom: 12px; background-color: #e8e8e8; border: 1px solid #aaaaaa; padding: 10px;
  }
  .form-group label { display: block; font-size: 14px; color: #333333; margin-bottom: 5px; font-weight: bold; }
  .form-group input[type="range"] {
    width: 100%; margin: 5px 0; background: #d0d0d0; height: 6px; border-radius: 3px;
    -webkit-appearance: none; appearance: none;
  }
  .form-group input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 20px; height: 20px; background: #888888; border: 1px solid #555555; cursor: pointer;
  }
  .checkbox-group {
    margin-bottom: 10px; display: flex; align-items: center; background-color: #e0e0e0;
    padding: 8px; border: 1px solid #aaaaaa;
  }
  .checkbox-group input[type="checkbox"] { width: 18px; height: 18px; margin-right: 10px; }
  .checkbox-group label { font-size: 14px; color: #333333; }
  .range-values {
    display: flex; justify-content: space-between; font-size: 12px; color: #555555; margin-top: 2px;
  }
  .btn-generate {
    width: 100%; padding: 12px;
    background: linear-gradient(180deg, #f0f0f0 0%, #c0c0c0 100%);
    border: 2px outset #cccccc; font-size: 16px; font-weight: bold; color: #333333;
    cursor: pointer; margin-top: 10px; text-shadow: 1px 1px 0px #ffffff;
  }
  .btn-generate:active {
    border-style: inset;
    background: linear-gradient(180deg, #c0c0c0 0%, #f0f0f0 100%);
  }
  .footer {
    margin-top: 15px; text-align: center; font-size: 12px; color: #666;
    border-top: 1px solid #aaa; padding-top: 8px;
  }
  .footer a { color: #333; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>:) Генератор паролей</h1>
  </div>
  <div class="content">
    <div class="password-output" id="passwordOutput">Нажмите кнопку «Сгенерировать»</div>

    <div class="form-group">
      <label>Длина пароля: <span id="lengthValue">12</span></label>
      <input type="range" id="lengthRange" min="5" max="32" value="12" oninput="updateLength(this.value)">
      <div class="range-values"><span>5</span><span>32</span></div>
    </div>

    <div class="form-group">
      <label>Количество паролей: <span id="countValue">5</span></label>
      <input type="range" id="countRange" min="1" max="20" value="5" oninput="updateCount(this.value)">
      <div class="range-values"><span>1</span><span>20</span></div>
    </div>

    <div class="checkbox-group">
      <input type="checkbox" id="chkLower" checked>
      <label for="chkLower">Строчные буквы (a-z)</label>
    </div>
    <div class="checkbox-group">
      <input type="checkbox" id="chkUpper" checked>
      <label for="chkUpper">Прописные буквы (A-Z)</label>
    </div>
    <div class="checkbox-group">
      <input type="checkbox" id="chkDigits" checked>
      <label for="chkDigits">Цифры (0-9)</label>
    </div>
    <div class="checkbox-group">
      <input type="checkbox" id="chkSymbols" checked>
      <label for="chkSymbols">Символы (@!#$%)</label>
    </div>

    <button class="btn-generate" onclick="generatePasswords()">Сгенерировать</button>

    <div class="footer">
      сайт для старых клиентов :)))<br>
      <a href="https://t.me/lublusebya1111" target="_blank">мой Telegram-канал</a>
    </div>
  </div>
</div>

<script>
  function updateLength(val) { document.getElementById('lengthValue').innerText = val; }
  function updateCount(val) { document.getElementById('countValue').innerText = val; }

  function generatePasswords() {
    var length = parseInt(document.getElementById('lengthRange').value);
    var count = parseInt(document.getElementById('countRange').value);
    var useLower = document.getElementById('chkLower').checked;
    var useUpper = document.getElementById('chkUpper').checked;
    var useDigits = document.getElementById('chkDigits').checked;
    var useSymbols = document.getElementById('chkSymbols').checked;

    var charset = '';
    if (useLower) charset += 'abcdefghijklmnopqrstuvwxyz';
    if (useUpper) charset += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    if (useDigits) charset += '0123456789';
    if (useSymbols) charset += '@!#$%';

    if (charset === '') {
      document.getElementById('passwordOutput').innerHTML = '<span style="color:red;">Выберите хотя бы один тип символов!</span>';
      return;
    }

    var result = '';
    for (var i = 0; i < count; i++) {
      var password = '';
      for (var j = 0; j < length; j++) {
        var randomIndex = Math.floor(Math.random() * charset.length);
        password += charset.charAt(randomIndex);
      }
      result += password + '\n';
    }
    document.getElementById('passwordOutput').innerText = result.trim();
  }
</script>
</body>
</html>
